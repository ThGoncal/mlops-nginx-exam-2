services:
  coherent_text-api:
    build:
      context: .
      dockerfile: src/api/v1/Dockerfile
    deploy:
      replicas: 3 # Lance 3 instances de ce service
    expose:
      - "8000"

  nginx:
    build:
      context: deployments/nginx/
      dockerfile: Dockerfile
    container_name: nginx_revproxy
    ports:
      - "8080:80" # http
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - coherent_text-api